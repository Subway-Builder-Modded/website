<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notice 207</title>
  <link rel="stylesheet" href="/odl/css/odl.css">
</head>
<body>
  <main class="odl-shell">
    <header class="odl-topbar">
      <h1 class="odl-title">Notice 207</h1>
      <span class="odl-badge">XFR/207</span>
    </header>
    <section class="odl-card">
      <p>
        Effective immediately, Gamma to Delta deferred transfer at Meridian Exchange is reassigned
        from Platform B to Platform D.
      </p>
      <p>
        Any continuity route trace that reaches Meridian Exchange must continue via Platform D,
        regardless of public board indicators.
      </p>
    </section>
  </main>
</body>
