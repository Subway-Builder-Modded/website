<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ODL Corridor Registry</title>
  <link rel="stylesheet" href="/odl/css/odl.css">
</head>
<body>
  <main class="odl-shell">
    <header class="odl-topbar">
      <h1 class="odl-title">Corridor Registry</h1>
      <span class="odl-badge">REG/COR/C</span>
    </header>
    <section class="odl-card">
      <table class="odl-table">
        <thead>
          <tr>
            <th>Corridor ID</th>
            <th>Sector Link</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>C1</td><td>C-E</td><td>Active</td></tr>
          <tr><td>C2</td><td>B-C</td><td>Active</td></tr>
          <tr><td>C3</td><td>D-F</td><td>Active</td></tr>
          <tr><td>C4</td><td>B-D</td><td>Retained</td></tr>
          <tr><td>C5</td><td>E-G</td><td>Active</td></tr>
          <tr><td>C6</td><td>A-B</td><td>Active</td></tr>
          <tr><td>C7</td><td>F-H</td><td>Retained</td></tr>
        </tbody>
      </table>
    </section>
    <section class="odl-note">
      Retained corridors remain provisioned for planning purposes under
      <a href="/odl/archive/notice-317.html">NTC-317</a>.
    </section>
  </main>
</body>
</html>
