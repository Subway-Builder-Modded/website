<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ODL Terminal Access</title>
  <link rel="stylesheet" href="/odl/css/odl.css">
</head>
<body>
  <main class="odl-shell">
    <header class="odl-topbar">
      <div>
        <h1 class="odl-title">Continuity Terminal Access</h1>
        <p class="odl-subtitle">Local validation node. No network authentication.</p>
      </div>
      <span class="odl-badge">TERMINAL/T1</span>
    </header>

    <section class="odl-terminal-shell">
      <div class="odl-terminal-log" data-terminal-log>Initializing local terminal context...</div>
      <form data-terminal-form>
        <label for="passcode">Passcode phrase</label>
        <div class="odl-terminal-row" style="margin-top: 0.4rem;">
          <input id="passcode" name="passcode" type="text" autocomplete="off" placeholder="TOKEN-TOKEN-NNN">
          <button type="submit">Submit</button>
        </div>
      </form>
      <div data-terminal-result style="margin-top: 0.7rem;"></div>
    </section>

    <footer class="odl-foot">Accepted format is derived from corridor trace and C-table extraction.</footer>
  </main>
  <script src="/odl/js/terminal.js"></script>
</body>
</html>
