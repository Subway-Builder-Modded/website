name: Build Site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Checkout registry analytics
        uses: actions/checkout@v4
        env:
          GITHUB_TOKEN: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
        with:
          repository: Subway-Builder-Modded/The-Railyard
          token: ${{ env.GITHUB_TOKEN }}
          path: The-Railyard
          sparse-checkout: |
            analytics
          sparse-checkout-cone-mode: true

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
          REGISTRY_ANALYTICS_DIR: ${{ github.workspace }}/The-Railyard/analytics
        run: pnpm run build
