name: Deploy Dev Site

on:
  push:
    branches:
      - dev
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: deploy-subway-builder-dev-site
  cancel-in-progress: false

jobs:
  check:
    name: Check code quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality control checks
        run: pnpm run check

  deploy:
    name: Deploy site (dev)
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ZONE_TAG: ${{ secrets.CLOUDFLARE_ZONE_TAG }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify analytics secrets
        shell: bash
        run: |
          zone_present=no
          token_present=no

          if [ -n "${CLOUDFLARE_ZONE_TAG}${CLOUDFLARE_ZONE_ID}" ]; then
            zone_present=yes
          fi

          if [ -n "${CLOUDFLARE_API_TOKEN}${CLOUDFLARE_TOKEN}${CF_API_TOKEN}" ]; then
            token_present=yes
          fi

          echo "Cloudflare zone present: ${zone_present}"
          echo "Cloudflare token present: ${token_present}"

      - name: Build for route discovery
        env:
          RAILYARD_GITHUB_TOKEN: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
        run: pnpm run build

      - name: Generate analytics and caches
        env:
          WEBSITE_PATH_SOURCE_DIR: ${{ github.workspace }}/out
          RAILYARD_GITHUB_TOKEN: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
        run: pnpm run analytics

      - name: Build
        env:
          RAILYARD_GITHUB_TOKEN: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
        run: pnpm run build

      - name: Deploy (dev)
        shell: bash
        env:
          GH_PAT: ${{ secrets.WEBSITE_DEV_PAT }}
        run: |
          set -euo pipefail

          rm -rf target-repo
          git clone "https://x-access-token:${GH_PAT}@github.com/Subway-Builder-Modded/website-dev.git" target-repo >/dev/null 2>&1
          cd target-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages >/dev/null 2>&1
            git checkout -B gh-pages origin/gh-pages >/dev/null 2>&1
          else
            git checkout --orphan gh-pages >/dev/null 2>&1
          fi

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          cp -R ../out/. .
          touch .nojekyll
          printf '%s\n' 'dev.subwaybuildermodded.com' > CNAME

          git add --all

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -qm "Deploy dev site from ${GITHUB_SHA}"
          echo "Commit created. Pushing to website-dev/gh-pages..."
          git push --verbose origin gh-pages:gh-pages
          echo "Push finished."
          