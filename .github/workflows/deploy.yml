name: Deploy Site

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: deploy-subway-builder-site
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Checkout The-Railyard analytics
        if: ${{ secrets.RAILYARD_GITHUB_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: Subway-Builder-Modded/The-Railyard
          token: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
          path: The-Railyard
          sparse-checkout: |
            analytics
          sparse-checkout-cone-mode: true

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
          REGISTRY_ANALYTICS_DIR: ${{ github.workspace }}/The-Railyard/analytics
        run: pnpm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_dir: ./out
          force_orphan: true
          cname: subwaybuildermodded.com
