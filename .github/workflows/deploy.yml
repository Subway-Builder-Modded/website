name: Deploy Site

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: deploy-subway-builder-site
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy site
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ZONE_TAG: ${{ secrets.CLOUDFLARE_ZONE_TAG }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Verify analytics secrets
        run: |
          echo "Cloudflare zone present: $([ -n \"${CLOUDFLARE_ZONE_TAG}${CLOUDFLARE_ZONE_ID}\" ] && echo yes || echo no)"
          echo "Cloudflare token present: $([ -n \"${CLOUDFLARE_API_TOKEN}${CLOUDFLARE_TOKEN}${CF_API_TOKEN}\" ] && echo yes || echo no)"

      - name: Build (route discovery)
        env:
          GITHUB_TOKEN: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
          RAILYARD_GITHUB_TOKEN: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
        run: pnpm run build

      - name: Regenerate website analytics snapshot
        env:
          WEBSITE_PATH_SOURCE_DIR: ${{ github.workspace }}/out
        run: pnpm run generate:website-analytics

      - name: Build (final deploy output)
        env:
          GITHUB_TOKEN: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
          RAILYARD_GITHUB_TOKEN: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
        run: pnpm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_dir: ./out
          force_orphan: true
          cname: subwaybuildermodded.com
